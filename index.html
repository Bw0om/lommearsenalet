    if(pinAfter){const f=pinAfter;pinAfter=null;f();}
  }else{showToast(ui('tWrong'));}
});

/* ================= FELLES SYNK (GitHub) ================= */
function loadShared(){
  fetch('felles.json?v='+Date.now())
    .then(r=>r.ok?r.json():null)
    .then(j=>{if(j&&j.custom){SHARED=j.custom;render();}})
    .catch(()=>{});
}
async function publishShared(){
  const gh=store.gh||{};
  if(!gh.repo||!gh.token){showToast(ui('tNeedGh'));return;}
  Object.keys(store.custom).forEach(k=>{
    const cur=(SHARED[k]||[]).map(x=>JSON.stringify(x));
    store.custom[k].forEach(it=>{const s=JSON.stringify(it);
      if(cur.indexOf(s)===-1){if(!SHARED[k])SHARED[k]=[];SHARED[k].push(it);cur.push(s);}});
  });
  const body=JSON.stringify({custom:SHARED},null,1);
  const url='https://api.github.com/repos/'+gh.repo+'/contents/felles.json';
  const hdr={Authorization:'Bearer '+gh.token,Accept:'application/vnd.github+json'};
  try{
    let sha=null;
    const g=await fetch(url+'?ref=main',{headers:hdr});
    if(g.ok){const j=await g.json();sha=j.sha;}
    const payload={message:'Oppdaterer felles tillegg (Lommearsenalet)',content:btoa(unescape(encodeURIComponent(body))),branch:'main'};
    if(sha)payload.sha=sha;
    const p=await fetch(url,{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},hdr),body:JSON.stringify(payload)});
    if(!p.ok)throw new Error('put '+p.status);
    store.custom={};saveStore();
    backupOverlay.classList.remove('show');
    render();showToast(ui('tPub'));
  }catch(e){showToast(ui('tPubErr'));}
}
function delShared(k,i){
  if(!canEdit()){askPin(()=>delShared(k,i));return;}
  if(SHARED[k]){SHARED[k].splice(i,1);if(!SHARED[k].length)delete SHARED[k];}
  render();publishShared();
}

/* ================= ADD SHEET ================= */
const addOverlay=document.getElementById('addOverlay');
let addTarget=null;
function openAdd(k,kind,gname){
  if(!canEdit()){askPin(()=>openAdd(k,kind,gname));return;}
  addTarget={k,kind};
  document.getElementById('addTitle').textContent=ui('addT'+kind);
  document.getElementById('addSub').textContent=ui('addSub1')+gname+ui('addSub2');
  const f1=document.getElementById('af1'),f2=document.getElementById('af2');
  f1.value='';f2.value='';
  if(kind==='W'){f1.placeholder=ui('phWord');f2.placeholder=ui('phDef');}
  else if(kind==='G'){f1.placeholder=ui('phGname');f2.placeholder=ui('phRules');}
  else{f1.placeholder=ui('phCtx');f2.placeholder=ui('phLine');}
  addOverlay.classList.add('show');
  setTimeout(()=>f1.focus(),80);
}
document.getElementById('addCancel').addEventListener('click',()=>addOverlay.classList.remove('show'));
addOverlay.addEventListener('click',e=>{if(e.target===addOverlay)addOverlay.classList.remove('show');});
document.getElementById('addSave').addEventListener('click',()=>{
  if(!addTarget)return;
  const f1=document.getElementById('af1').value.trim();
  const f2=document.getElementById('af2').value.trim();
  let entry;
  if(addTarget.kind==='W'){if(!f1){document.getElementById('af1').focus();return;}entry={word:f1,def:f2};}
  else if(addTarget.kind==='G'){if(!f1){document.getElementById('af1').focus();return;}entry={gname:f1,grulesTxt:f2};}
  else{if(!f2){document.getElementById('af2').focus();return;}entry={line:f2};if(f1)entry.ctx=f1;}
  if(!store.custom[addTarget.k])store.custom[addTarget.k]=[];
  store.custom[addTarget.k].push(entry);saveStore();
  addOverlay.classList.remove('show');render();showToast(ui('tAdd'));
});

/* ================= COPY & TOAST ================= */
const toast=document.getElementById('toast');let tT;
function showToast(msg){toast.textContent=msg||ui('tCopy');clearTimeout(tT);toast.classList.add('show');tT=setTimeout(()=>toast.classList.remove('show'),1300);}
function doCopy(text,after){
  const done=()=>{showToast(ui('tCopy'));if(after)after();};
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(done).catch(()=>fb(text,done));
  else fb(text,done);
}
function fb(text,done){const t=document.createElement('textarea');t.value=text;t.style.position='fixed';t.style.opacity='0';
  document.body.appendChild(t);t.select();try{document.execCommand('copy');done();}catch(_){}t.remove();}
function copyCard(card){doCopy(card.dataset.copy,()=>{card.classList.add('copied');setTimeout(()=>card.classList.remove('copied'),700);});}

/* ================= SEARCH BOX & LANG ================= */
const q=document.getElementById('q'),clr=document.getElementById('clear');
function clearBtn(){clr.classList.toggle('show',q.value.length>0);}
function resetSearch(){query='';q.value='';clearBtn();}
q.addEventListener('input',()=>{query=q.value;clearBtn();render();});
clr.addEventListener('click',()=>{resetSearch();render();q.focus();});
document.getElementById('brand').addEventListener('click',()=>{view='home';activeCat=null;resetSearch();render();});
document.getElementById('langseg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  lang=b.dataset.lang;store.lang=lang;saveStore();render();
});

/* ================= DICE ================= */
const dealOverlay=document.getElementById('dealOverlay');
let currentDeal=null;
function allLines(scope){
  const out=[];(scope?[scope]:SECTIONS).forEach(s=>s.groups.forEach(g=>{
    if(g.type==='dict'||g.type==='game')return;
    g.items.forEach(it=>out.push({s,g,it}));
    shared(s,g).forEach(it=>out.push({s,g,it}));
    custom(s,g).forEach(it=>out.push({s,g,it}));
  }));return out;
}
function deal(){
  const scope=(view==='category'&&activeCat)?findSection(activeCat):null;
  const pool=allLines(scope&&scope.id!=='spill'&&scope.id!=='ordbok'?scope:null);
  if(!pool.length)return;
  let pick_=pool[Math.floor(Math.random()*pool.length)];
  const key=x=>tf(x.it,'line');
  if(currentDeal&&pool.length>1){let guard=0;while(key(pick_)===currentDeal&&guard++<10)pick_=pool[Math.floor(Math.random()*pool.length)];}
  currentDeal=key(pick_);
  document.getElementById('dealScope').textContent=(scope&&scope.id!=='spill'&&scope.id!=='ordbok')?(ui('dealFrom')+pick(scope.title)):ui('dealAll');
  const c=tf(pick_.it,'ctx'),n=tf(pick_.it,'note');
  document.getElementById('dealCard').innerHTML=
    (c?`<div class="ctx">${esc(c)}</div>`:'')+
    `<p class="line q">«${esc(tf(pick_.it,'line'))}»</p>`+
    (n?`<p class="note">${esc(n)}</p>`:'');
  dealOverlay.classList.add('show');
}
document.getElementById('dice').addEventListener('click',deal);
document.getElementById('dealAgain').addEventListener('click',deal);
document.getElementById('dealCopy').addEventListener('click',()=>{if(currentDeal)doCopy(currentDeal);});
document.getElementById('dealClose').addEventListener('click',()=>dealOverlay.classList.remove('show'));
dealOverlay.addEventListener('click',e=>{if(e.target===dealOverlay)dealOverlay.classList.remove('show');});

  document.getElementById('ghToken').value=gh.token||'';
  backupOverlay.classList.add('show');
});
document.getElementById('ghPublish').addEventListener('click',()=>{
  const repo=document.getElementById('ghRepo').value.trim();
  const token=document.getElementById('ghToken').value.trim();
  if(!repo||!token){showToast(ui('tNeedGh'));return;}
  store.gh={repo:repo,token:token};saveStore();
  publishShared();
});
document.getElementById('closeBackup').addEventListener('click',()=>backupOverlay.classList.remove('show'));
backupOverlay.addEventListener('click',e=>{if(e.target===backupOverlay)backupOverlay.classList.remove('show');});
document.getElementById('copyBackup').addEventListener('click',()=>doCopy(JSON.stringify(store)));
document.getElementById('syncLink').addEventListener('click',()=>{
  const data=btoa(unescape(encodeURIComponent(JSON.stringify({custom:store.custom,favs:store.favs}))));
  doCopy(location.origin+location.pathname+'#sync='+data);
});
function mergeIn(o){
  const c=o.custom||{};
  Object.keys(c).forEach(k=>{
    if(!Array.isArray(c[k]))return;
    const cur=(store.custom[k]||[]).map(x=>JSON.stringify(x));
    c[k].forEach(it=>{const s=JSON.stringify(it);
      if(cur.indexOf(s)===-1){if(!store.custom[k])store.custom[k]=[];store.custom[k].push(it);cur.push(s);}});
  });
  (o.favs||[]).forEach(t=>{if(store.favs.indexOf(t)===-1)store.favs.push(t);});
  saveStore();
}
document.getElementById('doImport').addEventListener('click',()=>{
  const v=document.getElementById('importBox').value.trim();if(!v)return;
  try{
    const o=JSON.parse(v);
    if(o&&typeof o==='object'){
      const c=o.custom||o;
      Object.keys(c).forEach(k=>{if(Array.isArray(c[k]))store.custom[k]=(store.custom[k]||[]).concat(c[k]);});
      (o.favs||[]).forEach(t=>{if(store.favs.indexOf(t)===-1)store.favs.push(t);});
      saveStore();document.getElementById('importBox').value='';backupOverlay.classList.remove('show');render();showToast(ui('tImp'));
    }
  }catch(e){showToast(ui('tBad'));}
});

(function(){
  if(location.hash&&location.hash.indexOf('#sync=')===0){
    try{
      const o=JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(6)))));
      if(o&&typeof o==='object'&&confirm(ui('syncQ'))){mergeIn(o);showToast(ui('tSync'));}
    }catch(e){}
    try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}
  }
})();
render();
loadShared();
</script>
